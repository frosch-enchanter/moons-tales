<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dongeng Kita — Cerita Anak</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #FFF9F0;
    --card-bg: #FFFFFF;
    --text: #2D1B69;
    --muted: #7C6A9E;
    --accent1: #FF6B6B;
    --accent2: #FFD93D;
    --accent3: #6BCB77;
    --accent4: #4D96FF;
    --shadow: rgba(45,27,105,0.12);
    --radius: 20px;
    --header-bg: #2D1B69;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, #FFE4E1 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #E0F0FF 0%, transparent 40%);
  }
  header {
    background: var(--header-bg);
    padding: 0 2rem;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
    box-shadow: 0 4px 20px rgba(45,27,105,0.3);
  }
  .logo {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem; font-weight: 800; color: #fff;
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .search-bar {
    display: flex; align-items: center;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 50px; padding: 6px 16px; gap: 8px;
    transition: background 0.2s;
  }
  .search-bar:focus-within { background: rgba(255,255,255,0.2); }
  .search-bar input {
    background: none; border: none; outline: none;
    color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 0.9rem; width: 180px;
  }
  .search-bar input::placeholder { color: rgba(255,255,255,0.5); }
  .admin-link {
    background: var(--accent2); color: var(--text);
    border: none; border-radius: 50px; padding: 7px 18px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.85rem; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .admin-link:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,217,61,0.4); }
  .hero { text-align: center; padding: 3rem 2rem 2rem; }
  .hero-emojis { font-size: 2rem; letter-spacing: 0.5rem; margin-bottom: 0.75rem; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .hero h1 { font-family: 'Baloo 2', cursive; font-size: clamp(2rem,5vw,3.2rem); font-weight: 800; line-height: 1.15; margin-bottom: 0.75rem; }
  .hero h1 span { color: var(--accent1); }
  .hero p { font-size: 1.05rem; color: var(--muted); max-width: 500px; margin: 0 auto; line-height: 1.6; }
  .categories {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap; padding: 1.5rem 2rem;
  }
  .cat-btn {
    padding: 8px 20px; border-radius: 50px;
    border: 2px solid rgba(45,27,105,0.15);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: 0.88rem; cursor: pointer;
    background: var(--card-bg); color: var(--text);
    transition: all 0.2s;
  }
  .cat-btn:hover, .cat-btn.active {
    background: var(--text); color: #fff;
    border-color: var(--text);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px var(--shadow);
  }
  .gallery-section { padding: 0 2rem 4rem; max-width: 1200px; margin: 0 auto; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  .section-title { font-family: 'Baloo 2', cursive; font-size: 1.5rem; font-weight: 700; }
  .story-count { font-size: 0.85rem; color: var(--muted); background: var(--card-bg); padding: 4px 14px; border-radius: 50px; border: 1.5px solid rgba(45,27,105,0.1); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 24px; }
  .card {
    background: var(--card-bg); border-radius: var(--radius);
    overflow: hidden; box-shadow: 0 4px 20px var(--shadow);
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: pointer; display: flex; flex-direction: column;
    animation: cardIn 0.4s ease both;
  }
  .card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 40px var(--shadow); }
  @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .card-cover {
    height: 180px; display: flex; align-items: center;
    justify-content: center; font-size: 5rem; position: relative;
  }
  .card-badge {
    position: absolute; top: 12px; right: 12px;
    font-size: 0.7rem; font-weight: 700; padding: 4px 10px;
    border-radius: 50px; background: rgba(255,255,255,0.9); color: var(--text);
  }
  .card-body { padding: 1rem 1.25rem 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-title { font-family: 'Baloo 2', cursive; font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
  .card-meta { font-size: 0.78rem; color: var(--muted); }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin-top: 4px; flex: 1; }
  .read-btn {
    display: block; width: 100%; padding: 9px; border: none;
    border-radius: 12px; font-family: 'Baloo 2', cursive;
    font-weight: 700; font-size: 0.9rem; cursor: pointer;
    color: #fff; transition: filter 0.15s, transform 0.15s;
    text-align: center; margin-top: 10px;
  }
  .read-btn:hover { filter: brightness(1.1); transform: scale(1.02); }
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); grid-column: 1/-1; }
  .empty-state .big { font-size: 4rem; margin-bottom: 1rem; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); grid-column: 1/-1; font-size: 1.1rem; }
  .reader-overlay {
    display: none; position: fixed; inset: 0;
    background: #fff; z-index: 300; flex-direction: column;
  }
  .reader-overlay.open { display: flex; }
  .reader-bar {
    background: var(--header-bg); padding: 0 1.5rem;
    height: 52px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .reader-bar button {
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    padding: 6px 16px; border-radius: 50px;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer;
  }
  .reader-bar span { color: rgba(255,255,255,0.8); font-size: 0.9rem; }
  .reader-frame { flex: 1; width: 100%; border: none; }
  footer {
    background: var(--header-bg); color: rgba(255,255,255,0.6);
    text-align: center; padding: 2rem; font-size: 0.85rem; line-height: 1.8;
  }
  footer strong { color: #fff; }
  @media (max-width: 600px) {
    .search-bar { display: none; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .card-cover { height: 140px; font-size: 3.5rem; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">📚 Dongeng Kita</a>
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Cari cerita..." oninput="filterStories()">
  </div>
  <a class="admin-link" href="admin.html">⚙️ Admin</a>
</header>

<section class="hero">
  <div class="hero-emojis">🌟 🦁 🏰 🐉 🌈</div>
  <h1>Dunia <span>Cerita</span> yang<br>Penuh Keajaiban!</h1>
  <p>Jelajahi kumpulan dongeng seru untuk menemani hari-hari anak tercinta 🌙</p>
</section>

<div class="categories">
  <button class="cat-btn active" onclick="setCategory('semua',this)">🌟 Semua</button>
  <button class="cat-btn" onclick="setCategory('dongeng',this)">🏰 Dongeng</button>
  <button class="cat-btn" onclick="setCategory('fabel',this)">🦁 Fabel</button>
  <button class="cat-btn" onclick="setCategory('petualangan',this)">🗺️ Petualangan</button>
  <button class="cat-btn" onclick="setCategory('islami',this)">🌙 Islami</button>
  <button class="cat-btn" onclick="setCategory('sains',this)">🔬 Sains</button>
</div>

<main class="gallery-section">
  <div class="section-header">
    <h2 class="section-title">📖 Koleksi Cerita</h2>
    <span class="story-count" id="storyCount">memuat...</span>
  </div>
  <div class="grid" id="storyGrid">
    <div class="loading">⏳ Memuat cerita...</div>
  </div>
</main>

<footer>
  <strong>Dongeng Kita</strong> 🌟<br>
  Dibuat dengan ❤️ untuk anak-anak Indonesia
</footer>

<div class="reader-overlay" id="readerOverlay">
  <div class="reader-bar">
    <button onclick="closeReader()">← Kembali</button>
    <span id="readerTitle"></span>
  </div>
  <iframe class="reader-frame" id="readerFrame" sandbox="allow-scripts allow-same-origin"></iframe>
</div>

<script>
// =============================================
// GANTI DENGAN KREDENSIAL SUPABASE KAMU
// =============================================
const SUPABASE_URL = 'https://wtbbcupwrbmxxadrkciy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_x05GjY3C6ra5lmxSgSlUHw_VWsB4zWl';
// =============================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const COLORS = [
  { bg: '#FFF0E6', accent: '#FF6B6B' },
  { bg: '#E8F5FF', accent: '#4D96FF' },
  { bg: '#F0FBF0', accent: '#6BCB77' },
  { bg: '#FFF9E0', accent: '#FFD93D' },
  { bg: '#F5EEFF', accent: '#CC5DE8' },
  { bg: '#FFE8F0', accent: '#F06595' },
  { bg: '#E6FFFB', accent: '#20C997' },
  { bg: '#FFF3E0', accent: '#FF922B' },
];

let allStories = [];
let currentCategory = 'semua';

async function loadStories() {
  const { data, error } = await sb
    .from('stories')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    document.getElementById('storyGrid').innerHTML =
      '<div class="empty-state"><div class="big">⚠️</div><p>Gagal memuat cerita.<br>Pastikan konfigurasi Supabase sudah benar.</p></div>';
    return;
  }
  allStories = data || [];
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('storyGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allStories.filter(s => {
    const matchCat = currentCategory === 'semua' || s.category === currentCategory;
    const matchSearch = s.title.toLowerCase().includes(search) || (s.description || '').toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  document.getElementById('storyCount').textContent = filtered.length + ' cerita';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="big">📭</div><p>Belum ada cerita di sini.</p></div>';
    return;
  }

  grid.innerHTML = '';
  filtered.forEach((s, i) => {
    const c = COLORS[i % COLORS.length];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="card-cover" style="background:${c.bg}">
        ${s.emoji || '📖'}
        <span class="card-badge">${ageLabel(s.age_range)}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${s.title}</div>
        <div class="card-meta">${catLabel(s.category)} • ${s.age_range || ''}</div>
        <div class="card-desc">${s.description || ''}</div>
        <button class="read-btn" style="background:${c.accent}" onclick="openReader('${s.id}','${escHtml(s.title)}','${s.emoji || '📖'}','${s.file_path || ''}','${escHtml(s.description || '')}')">
          📖 Baca Sekarang
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function escHtml(s) { return s.replace(/'/g, "\\'"); }
function ageLabel(age) { const m={'3-5 tahun':'🐣 Kecil','6-8 tahun':'🌱 Sedang','9-12 tahun':'🌟 Besar'}; return m[age]||age||''; }
function catLabel(cat) { const m={dongeng:'🏰 Dongeng',fabel:'🦁 Fabel',petualangan:'🗺️ Petualang',islami:'🌙 Islami',sains:'🔬 Sains'}; return m[cat]||cat||''; }

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function filterStories() { renderGrid(); }

async function openReader(id, title, emoji, filePath, desc) {
  document.getElementById('readerTitle').textContent = emoji + ' ' + title;
  const frame = document.getElementById('readerFrame');

  if (filePath) {
    const { data } = sb.storage.from('stories').getPublicUrl(filePath);
    frame.src = data.publicUrl;
  } else {
    frame.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <style>body{font-family:Nunito,sans-serif;max-width:680px;margin:0 auto;padding:2rem;background:#FFF9F0;color:#2D1B69;line-height:1.8;}
    h1{font-size:2rem;margin-bottom:1rem;}.cover{font-size:6rem;text-align:center;padding:2rem;}
    p{font-size:1.05rem;margin-bottom:1rem;}.note{background:#FFF0E6;border-left:4px solid #FF6B6B;padding:1rem;border-radius:8px;font-size:.9rem;color:#7C6A9E;margin-top:2rem;}
    </style></head><body>
    <div class="cover">${emoji}</div><h1>${title}</h1><p>${desc}</p>
    <div class="note">📌 File HTML cerita belum diupload untuk cerita ini.</div>
    </body></html>`;
  }
  document.getElementById('readerOverlay').classList.add('open');
}

function closeReader() {
  document.getElementById('readerOverlay').classList.remove('open');
  document.getElementById('readerFrame').src = '';
}

loadStories();
</script>
</body>
</html>
